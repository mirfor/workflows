name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv sync --all-extras
      - run: uv run ruff check .
      - run: uv run ruff format --check .

  type:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv sync --all-extras
      - run: uv run mypy mapper validator generator activities scripts

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv sync --all-extras
      - run: uv run pytest

  codegen-idempotency:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv sync --all-extras
      - name: Regenerate workflows from blueprints
        run: uv run python -m scripts.regenerate_all || echo "regenerate_all not yet implemented"
      - name: Verify generated/ unchanged (idempotency)
        run: |
          if ! git diff --quiet generated/; then
            echo "ERROR: codegen is not idempotent — generated/ changed"
            git diff generated/
            exit 1
          fi
