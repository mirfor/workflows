sonar.projectKey=workflows
sonar.projectName=workflows
sonar.host.url=http://localhost:9000
sonar.sources=.
sonar.python.version=3.12
sonar.exclusions=**/.venv/**,**/venv/**,**/__pycache__/**,**/*.pyc,**/.pytest_cache/**,**/dist/**,**/build/**,**/*.egg-info/**,**/migrations/**,**/.mypy_cache/**,**/.ruff_cache/**,**/node_modules/**,**/generated/**

# Coverage exclusions — CLI entrypointy są testowane integracyjnie / E2E, nie unit;
# Sonar wciąż je analizuje (issues, complexity), ale nie liczy do coverage metrics.
# Synchronizowane z [tool.coverage.report] omit w pyproject.toml.
sonar.coverage.exclusions=scripts/**,worker.py,**/__init__.py,docs/**,blueprints/**,schemas/**

sonar.python.coverage.reportPaths=coverage.xml
sonar.test.inclusions=**/test_*.py,**/*_test.py,**/tests/**
